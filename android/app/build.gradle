plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def mapsKeys = new Properties()
def mapsKeysFile = rootProject.file("keys.properties")
if (mapsKeysFile.exists()) {
    mapsKeysFile.withInputStream { mapsKeys.load(it) }
}

def freeMapsApiKey =
        mapsKeys.getProperty("FREE_GOOGLE_MAPS_API_KEY")
                ?: project.findProperty("FREE_GOOGLE_MAPS_API_KEY")
                ?: System.getenv("FREE_GOOGLE_MAPS_API_KEY")
                ?: ""
def paidMapsApiKey =
        mapsKeys.getProperty("PAID_GOOGLE_MAPS_API_KEY")
                ?: project.findProperty("PAID_GOOGLE_MAPS_API_KEY")
                ?: System.getenv("PAID_GOOGLE_MAPS_API_KEY")
                ?: ""

android {
    namespace = "com.example.lilian_flutter_starter"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.lilian_flutter_starter"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    flavorDimensions += ["tier"]
    productFlavors {
        free {
            dimension "tier"
            applicationIdSuffix ".free"
            versionNameSuffix "-free"
            manifestPlaceholders = [
                    appName: "Story App Free",
                    googleMapsApiKey: freeMapsApiKey
            ]
        }
        paid {
            dimension "tier"
            applicationIdSuffix ".paid"
            versionNameSuffix "-paid"
            manifestPlaceholders = [
                    appName: "Story App Paid",
                    googleMapsApiKey: paidMapsApiKey
            ]
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
